<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6"/>
      <stop offset="50%" style="stop-color:#EC4899"/>
      <stop offset="100%" style="stop-color:#F59E0B"/>
    </linearGradient>
    <linearGradient id="logoGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#A855F7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="90" fill="url(#logoGrad)" opacity="0.2"/>
  <circle cx="100" cy="100" r="80" fill="none" stroke="url(#logoGrad)" stroke-width="2"/>
  
  <!-- Spade Symbol -->
  <path d="M100 25 C100 25 130 55 130 80 C130 100 115 110 100 110 C85 110 70 100 70 80 C70 55 100 25 100 25" 
        fill="url(#logoGrad2)" filter="url(#glow)"/>
  <path d="M95 110 L105 110 L100 125 Z" fill="url(#logoGrad2)"/>
  
  <!-- Heart Symbol -->
  <path d="M60 70 C60 60 70 50 85 65 C100 50 110 60 110 70 C110 90 85 110 85 110 C85 110 60 90 60 70" 
        fill="#EC4899" opacity="0.9" transform="translate(-20, 20) scale(0.6)"/>
  
  <!-- Diamond Symbol -->
  <path d="M140 70 L155 90 L140 110 L125 90 Z" fill="#3B82F6" opacity="0.9" transform="translate(10, 10) scale(0.7)"/>
  
  <!-- Club Symbol -->
  <circle cx="160" cy="75" r="12" fill="#22C55E" opacity="0.9"/>
  <circle cx="150" cy="90" r="12" fill="#22C55E" opacity="0.9"/>
  <circle cx="170" cy="90" r="12" fill="#22C55E" opacity="0.9"/>
  <path d="M160 90 L160 108 L155 108 L165 108 Z" fill="#22C55E" opacity="0.9"/>
  
  <!-- Text -->
  <text x="100" y="165" text-anchor="middle" font-family="Tajawal, sans-serif" font-size="24" font-weight="bold" fill="white" filter="url(#glow)">قدرات</text>
  <text x="100" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#94A3B8">QODRAT</text>
</svg>